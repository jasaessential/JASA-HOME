<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfectly Aligned JASA ESSENTIAL (Clean Redirect Final)</title>
    
    <!-- * 1. PROJECT PLACEHOLDERS * -->
    <!-- FAVICON LINK: Uncomment and replace href when ready -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    
    <!-- EXTERNAL CSS LINK: Uncomment this line to link to your custom stylesheet -->
    <!-- <link rel="stylesheet" href="styles.css"> -->
    
    <!-- 2. Bootstrap CSS CDN (Retained) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" xintegrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Use Inter font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* * 1. BASE STYLES & VARIABLES 
         */
        :root {
            --dot-size: 0.4vw; 
            --dot-spacing: 5vw;
            --animation-duration: 1.5s; /* Max fast dots */
            --dynamic-color: #4169E1; 
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow: hidden; 
            transition: background-color 0.5s ease;
        }

        /* * 2. GRADIENT BACKGROUND & DOTS
         */
        .background-gradient {
            background: linear-gradient(
                to bottom, 
                white 0%,            
                var(--dynamic-color) 50%,         
                white 100%           
            );
            background-attachment: fixed;
            width: 100%;
            height: 100vh;
        }
        
        #dot-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0; 
            
            background-image: radial-gradient(
                circle at center, 
                rgba(255, 255, 255, 0.3) var(--dot-size),
                transparent var(--dot-size)
            );

            background-size: var(--dot-spacing) var(--dot-spacing);
            animation: scrollUp var(--animation-duration) linear infinite; 
        }

        /* * 3. KEYFRAMES FOR DOTS (Only dots are animated)
         */
        @keyframes scrollUp {
            from { background-position: 0 0; }
            to { background-position: 0 calc(var(--dot-spacing) * -1); }
        }
        
        /* * 4. BRANDING TEXT STYLING 
         */
        .brand-container {
            position: relative;
            z-index: 10;
            display: inline-block; 
            text-align: center;
            opacity: 1; 
        }

        /* JASA - Large, bold text (Static) */
        .brand-text {
            display: block;
            font-weight: 900;
            color: white; 
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.4); 
            font-size: clamp(4rem, 20vw, 12rem); 
            line-height: 1;
            letter-spacing: 0; 
            word-spacing: 0;
            white-space: nowrap;
        }
        
        /* ESSENTIAL - Alignment and styling (Static, Instant Load) */
        .sub-text {
            display: block;
            font-weight: 900; 
            color: #F0F0F0; 
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            line-height: 1.2;
            font-size: clamp(1rem, 3.5vw, 3rem); 
            margin-top: clamp(0.5rem, 1vw, 1rem); 
            
            /* --- ALIGNMENT TRICK --- */
            width: 100%; 
            text-align: justify; 
            text-align-last: justify;
            word-spacing: 1.25vw; 
            letter-spacing: 0; 
            opacity: 1; 
        }

        /* Forcing single-line justification */
        .sub-text::after {
            content: '';
            display: inline-block;
            width: 100%;
        }

        /* * 5. MEDIA QUERIES FOR RESPONSIVENESS (Alignment and Dots) */

        /* Tablet (768px and up) */
        @media (min-width: 768px) {
            :root {
                --dot-size: 0.4vw;
                --dot-spacing: 4vw;
            }
            .sub-text {
                word-spacing: 0.9vw;
            }
        }

        /* Desktop (1024px and up) */
        @media (min-width: 1024px) {
            :root {
                --dot-size: 0.3vw;
                --dot-spacing: 3.5vw;
            }
            .sub-text {
                word-spacing: 0.8vw;
            }
        }
    </style>
</head>
<body class="background-gradient d-flex justify-content-center align-items-center vh-100">

    <!-- The animated dot grid overlay -->
    <div id="dot-overlay"></div>

    <!-- The centered, static brand text block -->
    <div class="brand-container">
        <!-- JASA (Static) -->
        <span class="brand-text select-none">
            JASA
        </span>
        <!-- ESSENTIAL (Aligned perfectly under JASA, Static) -->
        <span class="sub-text select-none">
            E S S E N T I A L
        </span>
    </div>

    <!-- Bootstrap JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" xintegrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- EXTERNAL JS LINK: Uncomment this line to link to your custom script -->
    <!-- <script src="script.js"></script> -->

    <script>
        // Define the color options for the dynamic background
        const colors = {
            'blue': '#4169E1',        // Royal Blue
            'dark-gray': '#4F4F4F',   // Darker Gray
            'green': '#28A745'        // Vibrant Green
        };
        
        // * PLACEHOLDER WEB LINKS (Add your desired URLs here) *
        // This array defines the links the user will be redirected to randomly.
        const redirectLinks = [
            https://jasaessential00.netlify.app/
        ];
        
        const REDIRECT_DELAY_MS = 5000; // 5 seconds
        
        /**
         * Sets a random background color on load.
         */
        function setDynamicColor() {
            const colorKeys = Object.keys(colors);
            const randomKey = colorKeys[Math.floor(Math.random() * colorKeys.length)];
            const randomColor = colors[randomKey];
            document.documentElement.style.setProperty('--dynamic-color', randomColor);
        }
        
        /**
         * Selects a random link and redirects the user after the delay.
         */
        function performRedirect() {
            // Select a random link
            const randomIndex = Math.floor(Math.random() * redirectLinks.length);
            const destinationUrl = redirectLinks[randomIndex];
            
            console.log(Redirecting after ${REDIRECT_DELAY_MS / 1000} seconds to: ${destinationUrl});
            
            // Redirect using replace() to prevent back navigation issues
            window.location.replace(destinationUrl);
        }

        /**
         * Initializes the page and starts the redirect timer.
         */
        function initializePage() {
            setDynamicColor();
            
            // Start the redirect timer, running silently
            setTimeout(performRedirect, REDIRECT_DELAY_MS);
        }

        // --- Initialization ---
        window.onload = initializePage;

        function handleResize() {
            console.log(Window width: ${window.innerWidth}px. Dynamic color set.);
        }

        window.addEventListener('resize', handleResize);
    </script>
</body>
</html>
