<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JASA Brand Splash</title>
  
  <!-- SEO & Brand Identity -->
  <meta name="description" content="A modern, aesthetic landing page for the JASA brand with redirection capabilities.">
  <meta name="theme-color" content="#000000">

  <!-- 
    ASSETS & ICONS 
    Create a folder named 'assets' in your public/root directory.
    Add your images there with these filenames:
    - favicon.png
    - apple-touch-icon.png
    - og-image.png
  -->
  <link rel="icon" href="/assets/favicon.png">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

  <!-- SOCIAL MEDIA / OPEN GRAPH -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="JASA Brand Splash">
  <meta property="og:description" content="Innovating the Future with JASA.">
  <meta property="og:image" content="/assets/og-image.png">
  <meta property="og:url" content="https://jasaessential.com">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* * GLOBAL STYLES AND VARIABLES */
    :root {
      /* Responsive font sizes using viewport width */
      --main-font-size: 18vw; 
      --tagline-font-size: 4vw;
      --dot-animation-duration: 25s;
      --grid-size: 50px; 
      --dot-size: 3px; 
      /* Brand Colors - Updated dynamically via JS */
      --brand-color-dark: #60a5fa; /* Default Fallback */
      --brand-color-light: #ffffff; /* White */
      --tagline-color: #000000; /* Default Text Color */
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-width: 100vw;
      display: flex; 
      flex-direction: column;
      justify-content: center; 
      align-items: center;
      /* Gradient from Random Color (bottom) to White (top) */
      background: linear-gradient(to top, var(--brand-color-dark), var(--brand-color-light));
      font-family: 'Poppins', sans-serif;
      overflow: hidden; 
      position: relative;
      transition: transform 1.2s cubic-bezier(0.8, 0.05, 0.2, 0.95), 
                  opacity 1.2s cubic-bezier(0.8, 0.05, 0.2, 0.95);
      padding: 0; 
      box-sizing: border-box;
    }

    /* * BACKGROUND ANIMATION STYLES */
    .dot-grid {
      position: absolute;
      top: 0;
      width: 100vw; 
      left: 50%; 
      transform: translateX(-50%) translateY(0%);
      height: 200%;
      background-image: radial-gradient(circle, white var(--dot-size), transparent var(--dot-size));
      background-size: var(--grid-size) var(--grid-size);
      animation: moveGrid var(--dot-animation-duration) linear infinite;
      z-index: 0;
      opacity: 0.4; 
    }

    @keyframes moveGrid {
      from { transform: translateX(-50%) translateY(0%); }
      to   { transform: translateX(-50%) translateY(-50%); } 
    }

    /* * MAIN CONTENT (JASA Logo) STYLES */
    .brand-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      position: relative;
      z-index: 1; 
      width: 100%;
      max-width: 100vw; 
      margin: 0;
      padding: 0 5vw; /* Safe area for edges */
      box-sizing: border-box;
    }

    .logo-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Ensures the wrapper fits the content exactly */
      width: min-content; 
    }

    /* Logo Styling */
    .brand-logo {
      display: flex;
      justify-content: space-between; 
      width: max-content; /* Critical: Logo determines the width */
      opacity: 0;
      animation: fadeUp 1s ease forwards;
      margin: 0;
      padding: 0;
      line-height: 0.9; 
      white-space: nowrap;
      /* JASA Logo stays white typically, unless handled otherwise */
      color: white; 
      text-shadow: 0 4px 12px rgba(0,0,0,0.1); /* Subtle shadow for better visibility on light backgrounds */
    }

    .brand-logo span {
      display: inline-block;
      font-size: var(--main-font-size);
      font-weight: 700;
      margin: 0; 
      padding: 0;
      letter-spacing: -0.02em; 
    }

    @keyframes fadeUp {
      to { opacity: 1; }
    }

    /* Tagline (ESSENTIAL) Styling */
    .tagline {
      /* Flex with space-between pushes first letter to far left and last to far right */
      display: flex;
      justify-content: space-between; 
      width: 100%; /* Will match parent width, which matches logo width */
      margin: 0; 
      padding: 0;
      line-height: 1;
      opacity: 0; /* Hidden until width is calculated */
      transition: opacity 0.5s ease;
      white-space: nowrap;
      /* Dynamic Color based on background */
      color: var(--tagline-color);
    }
    
    .tagline span {
      font-size: var(--tagline-font-size);
      font-weight: 700;
      display: inline-block;
    }
    
    .tagline.visible {
        opacity: 1;
        animation: blinkText 2s infinite;
    }

    /* Tagline stagger delays */
    .tagline span { opacity: 0; animation: fadeUp 1s ease forwards; }
    .tagline span:nth-child(1) { animation-delay: 0.5s; }
    .tagline span:nth-child(2) { animation-delay: 0.6s; }
    .tagline span:nth-child(3) { animation-delay: 0.7s; }
    .tagline span:nth-child(4) { animation-delay: 0.8s; }
    .tagline span:nth-child(5) { animation-delay: 0.9s; }
    .tagline span:nth-child(6) { animation-delay: 1.0s; }
    .tagline span:nth-child(7) { animation-delay: 1.1s; }
    .tagline span:nth-child(8) { animation-delay: 1.2s; }
    .tagline span:nth-child(9) { animation-delay: 1.3s; }

    @keyframes blinkText {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* * MOBILE VIEW OPTIMIZATION */
    @media (max-width: 768px) {
        :root {
            --main-font-size: 20vw; 
            --tagline-font-size: 4.5vw;
            --grid-size: 30px; 
        }
    }
    
    /* * LARGE SCREEN OPTIMIZATION */
    @media (min-width: 1200px) {
        :root {
            --main-font-size: 8vw;
            --tagline-font-size: 1.8vw;
        }
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>

  <!-- Background Grid of Symmetry Dots -->
  <div class="dot-grid"></div>

  <!-- Main Brand Logo Container -->
  <div class="brand-container">
    <!-- The wrapper shrinks to fit the JASA text exactly -->
    <div class="logo-wrapper" id="logo-wrapper">
      
      <!-- JASA Logo -->
      <div class="brand-logo" id="jasa-logo">
        <span>J</span><span>A</span><span>S</span><span>A</span>
      </div>

      <!-- Tagline: 'justify-content: space-between' ensures E aligns with J and L aligns with A -->
      <div class="tagline" id="tagline">
        <span>E</span><span>S</span><span>S</span><span>E</span>
        <span>N</span><span>T</span><span>I</span><span>A</span><span>L</span>
      </div>
      
    </div>
  </div>
  
  <div id="root" style="display: none;"></div>
  
  <script>
    /**
     * RANDOM THEME LOGIC
     * Picks a random background color on load.
     * Sets ESSENTIAL text color to White ONLY if background is Black.
     * Otherwise sets ESSENTIAL text color to Black.
     */
    const THEMES = [
      { color: '#16a34a', name: 'Green',         taglineColor: '#000000' }, 
      { color: '#86efac', name: 'Light Green',   taglineColor: '#000000' }, 
      { color: '#1e40af', name: 'Royal Blue',    taglineColor: '#000000' }, 
      { color: '#334155', name: 'Dark Grey',     taglineColor: '#000000' }, 
      { color: '#000000', name: 'Black',         taglineColor: '#ffffff' }  
    ];

    function applyRandomTheme() {
        const theme = THEMES[Math.floor(Math.random() * THEMES.length)];
        const root = document.documentElement;
        
        // Apply Variables
        root.style.setProperty('--brand-color-dark', theme.color);
        root.style.setProperty('--tagline-color', theme.taglineColor);
        
        // Update Mobile Browser Theme Color
        const metaThemeColor = document.querySelector('meta[name="theme-color"]');
        if (metaThemeColor) metaThemeColor.setAttribute('content', theme.color);

        console.log(`Theme Applied: ${theme.name}`);
    }
    
    // Apply immediately
    applyRandomTheme();


    // Configuration
    const REDIRECT_URLS = [
      "https://aquamarine-faloodeh-4c53c3.netlify.app/",
      "https://jasaessential.com/"
    ]; 
    const SLIDE_DURATION_MS = 1200;    
    
    const body = document.body;
    const jasaLogo = document.getElementById('jasa-logo');
    const tagline = document.getElementById('tagline');
    const wrapper = document.getElementById('logo-wrapper');
    
    /**
     * ALIGNMENT LOGIC
     * 1. The wrapper is width: min-content (shrinks to JASA).
     * 2. JASA determines the width.
     * 3. Tagline is width: 100% of wrapper.
     * 4. Tagline flex space-between spreads letters to edges.
     */
    function alignTagline() {
        if (!jasaLogo || !tagline) return;
        
        // Simply triggering a reflow to ensure CSS constraints apply
        const width = jasaLogo.offsetWidth;
        if (width > 0) {
            tagline.classList.add('visible');
        }
    }

    // Observers to handle all resize/load events
    const resizeObserver = new ResizeObserver(() => {
        requestAnimationFrame(alignTagline);
    });
    
    if (jasaLogo) resizeObserver.observe(jasaLogo);
    if (wrapper) resizeObserver.observe(wrapper);

    // Font loading check
    if (document.fonts) {
        document.fonts.ready.then(alignTagline);
    }

    window.addEventListener('load', alignTagline);
    window.addEventListener('resize', alignTagline);
    
    /**
     * Redirect Logic
     */
    function startFadeOutAndRedirect() {
        const randomUrl = REDIRECT_URLS[Math.floor(Math.random() * REDIRECT_URLS.length)];
        body.style.transform = 'translateX(-10vw)';
        body.style.opacity = '0';
        setTimeout(() => {
            window.location.href = randomUrl;
        }, SLIDE_DURATION_MS);
    }
    
    function initSplash() {
        alignTagline();
        setTimeout(startFadeOutAndRedirect, 3000);
    }

    document.addEventListener('DOMContentLoaded', initSplash);
  </script>

<script type="module" src="/index.tsx"></script>
</body>
</html>
